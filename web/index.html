<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FORJIS</title>
<style>
  :root{
    --bg:#02040a; --fg:#cfeeff; --muted:#5c7894;
    --cy:#37e6ff; --cy2:#1aa6ff; --gold:#ffb44d; --red:#ff5b6e; --grn:#3dffa8;
    --line:rgba(70,150,210,.16); --panel:rgba(10,22,40,.42);
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%;overflow:hidden}
  body{font-family:"Segoe UI",system-ui,sans-serif;color:var(--fg);background:var(--bg);
    cursor:default;user-select:none}
  canvas{display:block}
  #bg,#reactor{position:fixed;inset:0;width:100%;height:100%}
  #reactor{z-index:1}
  .scan{position:fixed;inset:0;z-index:2;pointer-events:none;
    background:repeating-linear-gradient(0deg,rgba(0,0,0,0) 0,rgba(0,0,0,0) 2px,rgba(0,20,40,.18) 3px);
    mix-blend-mode:overlay;opacity:.5}
  .vig{position:fixed;inset:0;z-index:2;pointer-events:none;
    background:radial-gradient(circle at 50% 50%,transparent 45%,rgba(0,0,0,.65) 100%)}
  .hud{position:fixed;inset:0;z-index:3;pointer-events:none}
  .hud > *{pointer-events:auto}
  .mono{font-family:ui-monospace,"Consolas",monospace}

  /* corner brackets */
  .br{position:fixed;width:54px;height:54px;border:2px solid var(--cy);opacity:.4;z-index:3}
  .br.tl{top:14px;left:14px;border-right:0;border-bottom:0}
  .br.tr{top:14px;right:14px;border-left:0;border-bottom:0}
  .br.bl{bottom:14px;left:14px;border-right:0;border-top:0}
  .br.brr{bottom:14px;right:14px;border-left:0;border-top:0}

  /* top */
  .clock{position:fixed;top:22px;left:34px;z-index:4}
  .clock .t{font-size:46px;font-weight:200;letter-spacing:4px;color:#eafaff;
    text-shadow:0 0 24px rgba(55,230,255,.4);line-height:1}
  .clock .d{font-size:12px;letter-spacing:.4em;color:var(--cy);text-transform:uppercase;margin-top:4px}
  .brandtop{position:fixed;top:26px;left:50%;transform:translateX(-50%);z-index:4;
    font-weight:800;letter-spacing:.7em;font-size:15px;color:transparent;
    background:linear-gradient(90deg,#9af0ff,#2aa6ff);-webkit-background-clip:text;background-clip:text;
    text-shadow:0 0 30px rgba(55,230,255,.3)}
  .status{position:fixed;top:56px;right:34px;z-index:4;display:flex;flex-direction:column;gap:6px;align-items:flex-end}
  .wctl{position:fixed;top:14px;right:16px;z-index:8;display:none;gap:6px}
  .wctl button{width:32px;height:26px;font-size:13px;padding:0;background:rgba(10,22,40,.6);
    border:1px solid var(--line);color:var(--muted);border-radius:7px}
  .wctl button:hover{color:var(--cy);border-color:var(--cy)}
  .wctl button.x:hover{color:var(--red);border-color:var(--red)}
  .pill{font-size:10.5px;letter-spacing:.12em;color:var(--muted);display:flex;align-items:center;gap:7px;
    background:var(--panel);border:1px solid var(--line);border-radius:14px;padding:5px 11px;backdrop-filter:blur(6px)}
  .dot{width:7px;height:7px;border-radius:50%;background:var(--red);box-shadow:0 0 9px var(--red)}
  .dot.on{background:var(--grn);box-shadow:0 0 9px var(--grn)}

  /* left telemetry */
  .tele{position:fixed;left:34px;top:50%;transform:translateY(-50%);z-index:4;width:210px;display:flex;flex-direction:column;gap:16px}
  .gauge .gh{display:flex;justify-content:space-between;font-size:10px;letter-spacing:.22em;color:var(--muted);margin-bottom:5px;text-transform:uppercase}
  .gauge .gh b{color:var(--cy);font-weight:600}
  .bar{height:7px;border-radius:6px;background:rgba(55,230,255,.08);border:1px solid var(--line);overflow:hidden}
  .bar i{display:block;height:100%;width:0;border-radius:6px;
    background:linear-gradient(90deg,var(--cy2),var(--cy));box-shadow:0 0 10px var(--cy);transition:width .6s ease}
  .ticks{display:flex;gap:3px;margin-top:8px}
  .ticks span{flex:1;height:14px;background:rgba(55,230,255,.07);border-radius:1px}
  .ticks span.a{background:var(--cy);box-shadow:0 0 6px var(--cy)}

  /* right transcript */
  .feed{position:fixed;right:30px;top:50%;transform:translateY(-50%);z-index:4;width:330px;max-height:54vh;
    display:flex;flex-direction:column;gap:8px;overflow:hidden;mask:linear-gradient(0deg,transparent,#000 14%,#000 86%,transparent)}
  #log{display:flex;flex-direction:column;gap:8px;overflow-y:auto;padding-right:4px}
  #log::-webkit-scrollbar{width:0}
  .msg{font-size:13.5px;line-height:1.4;padding:8px 11px;border-radius:10px;animation:slide .3s ease;backdrop-filter:blur(4px)}
  .msg .w{font-size:9px;letter-spacing:.18em;text-transform:uppercase;opacity:.55;margin-bottom:3px}
  .msg.you{background:rgba(55,230,255,.08);border:1px solid rgba(55,230,255,.22);align-self:flex-end;text-align:right}
  .msg.bot{background:rgba(255,180,77,.06);border:1px solid rgba(255,180,77,.2)}
  @keyframes slide{from{opacity:0;transform:translateX(14px)}to{opacity:1;transform:none}}

  /* center state */
  .center{position:fixed;left:50%;top:62%;transform:translateX(-50%);z-index:4;text-align:center}
  .state{font-size:15px;letter-spacing:.42em;text-transform:uppercase;color:var(--cy);
    text-shadow:0 0 18px rgba(55,230,255,.5);min-height:18px}
  .hint{font-size:10px;letter-spacing:.25em;color:var(--muted);margin-top:8px;text-transform:uppercase}

  /* bottom controls */
  .dock{position:fixed;left:50%;bottom:18px;transform:translateX(-50%);z-index:5;display:flex;align-items:center;
    gap:8px;flex-wrap:wrap;justify-content:center;background:var(--panel);border:1px solid var(--line);
    border-radius:14px;padding:8px 12px;backdrop-filter:blur(10px);max-width:94vw}
  .dock input{background:transparent;border:none;outline:none;color:var(--fg);font-size:13px}
  #cmd{min-width:230px}
  #pers{min-width:120px}
  .ipwrap{display:flex;align-items:center;border:1px solid var(--line);border-radius:9px;padding:5px 9px}
  button{background:rgba(55,230,255,.1);border:1px solid rgba(55,230,255,.3);color:var(--cy);border-radius:9px;
    padding:6px 12px;font-size:12px;cursor:pointer;transition:.15s;font-family:inherit}
  button:hover{background:rgba(55,230,255,.22)}
  .seg{display:flex;border:1px solid var(--line);border-radius:9px;overflow:hidden}
  .seg button{border:0;border-radius:0;background:transparent;color:var(--muted);padding:6px 9px}
  .seg button.active{background:rgba(55,230,255,.18);color:var(--cy)}
  .sep{width:1px;height:20px;background:var(--line)}

  /* clap flash */
  #flash{position:fixed;inset:0;z-index:6;pointer-events:none;background:radial-gradient(circle,rgba(55,230,255,.25),transparent 60%);opacity:0;transition:opacity .12s}

  /* boot overlay */
  #boot{position:fixed;inset:0;z-index:20;background:#02040a;display:flex;flex-direction:column;
    align-items:center;justify-content:center;gap:8px;transition:opacity .8s}
  #boot .bl{font-family:ui-monospace,monospace;font-size:13px;letter-spacing:.2em;color:var(--cy);opacity:0}
  #boot .big{font-size:40px;font-weight:800;letter-spacing:.5em;margin-bottom:18px;
    background:linear-gradient(90deg,#9af0ff,#2aa6ff);-webkit-background-clip:text;background-clip:text;color:transparent}
  @media (max-width:900px){.tele,.feed{display:none}}
</style>
</head>
<body>
<canvas id="bg"></canvas>
<canvas id="reactor"></canvas>
<div class="scan"></div><div class="vig"></div>
<div id="flash"></div>

<div class="br tl"></div><div class="br tr"></div><div class="br bl"></div><div class="br brr"></div>

<div class="wctl" id="wctl">
  <button id="wmin" title="Minimizar">—</button>
  <button id="wfs" title="Pantalla completa">⤢</button>
  <button id="wx" class="x" title="Cerrar">✕</button>
</div>

<div class="hud">
  <div class="brandtop">F O R J I S</div>
  <div class="clock"><div class="t" id="clk">--:--</div><div class="d" id="dte">—</div></div>
  <div class="status">
    <span class="pill"><span id="wsDot" class="dot"></span><span id="wsTxt">enlace</span></span>
    <span class="pill"><span id="brainDot" class="dot"></span><span id="brainTxt">núcleo</span></span>
    <span class="pill" id="modelPill">—</span>
    <span class="pill" id="voicePill">voz</span>
  </div>

  <div class="tele">
    <div class="gauge"><div class="gh"><span>CPU</span><b id="cpuV">--%</b></div><div class="bar"><i id="cpuB"></i></div></div>
    <div class="gauge"><div class="gh"><span>Memoria</span><b id="ramV">--%</b></div><div class="bar"><i id="ramB"></i></div></div>
    <div class="gauge"><div class="gh"><span>Señal mic</span><b id="micV">0%</b></div><div class="ticks" id="micTicks"></div></div>
    <div class="gauge"><div class="gh"><span>Uptime</span><b id="upV">0s</b></div></div>
  </div>

  <div class="feed"><div id="log"></div></div>

  <div class="center"><div class="state" id="stateLabel">Conectando…</div>
    <div class="hint">Decí "FORJIS" o aplaudí dos veces 👏</div></div>

  <div class="dock">
    <div class="ipwrap"><input id="cmd" type="text" placeholder="Escribile a FORJIS…" autocomplete="off"></div>
    <button id="send">▶</button><div class="sep"></div>
    <div class="seg" id="voiceSeg"><button data-voice="hombre">H</button><button data-voice="mujer">M</button></div>
    <div class="seg" id="speedSeg"><button data-speed="lento">‹</button><button data-speed="normal">•</button><button data-speed="rapido">›</button></div>
    <div class="sep"></div>
    <div class="ipwrap"><input id="pers" type="text" placeholder="Personalidad…"></div>
    <button id="savePers">✓</button>
    <div class="sep"></div>
    <button id="brainBtn" title="Cambiar cerebro: Claude (nube) ↔ Local (gratis/offline)">🧠 —</button>
    <button id="demo">Demo</button>
  </div>
</div>

<div id="boot"><div class="big">FORJIS</div>
  <div class="bl" id="b0">▸ INICIALIZANDO NÚCLEO NEURAL…</div>
  <div class="bl" id="b1">▸ CARGANDO MÓDULO DE VOZ…</div>
  <div class="bl" id="b2">▸ ENLAZANDO SENSORES…</div>
  <div class="bl" id="b3">▸ SISTEMAS EN LÍNEA</div>
</div>

<script>
// ---------- boot ----------
['b0','b1','b2','b3'].forEach((id,i)=>setTimeout(()=>{document.getElementById(id).style.opacity=1;},400+i*420));
setTimeout(()=>{const b=document.getElementById('boot');b.style.opacity=0;setTimeout(()=>b.remove(),900);},2700);

// ---------- controles de ventana (solo en la app nativa) ----------
window.addEventListener('pywebviewready',()=>{
  document.getElementById('wctl').style.display='flex';
  document.getElementById('wx').onclick=()=>window.pywebview.api.close();
  document.getElementById('wmin').onclick=()=>window.pywebview.api.minimize();
  document.getElementById('wfs').onclick=()=>window.pywebview.api.toggle_fullscreen();
});

// ---------- reloj ----------
function tick(){const n=new Date();
  document.getElementById('clk').textContent=n.toTimeString().slice(0,8);
  const dias=['DOM','LUN','MAR','MIÉ','JUE','VIE','SÁB'];
  document.getElementById('dte').textContent=dias[n.getDay()]+' '+String(n.getDate()).padStart(2,'0')+'/'+String(n.getMonth()+1).padStart(2,'0')+'/'+n.getFullYear();}
tick();setInterval(tick,1000);

// mic ticks
const micTicks=document.getElementById('micTicks');
for(let i=0;i<14;i++){micTicks.appendChild(document.createElement('span'));}

// ---------- WebSocket ----------
let ws;
function connect(){
  ws=new WebSocket("ws://"+location.host+"/ws");
  ws.onopen=()=>{document.getElementById('wsDot').classList.add('on');document.getElementById('wsTxt').textContent='enlace';};
  ws.onclose=()=>{document.getElementById('wsDot').classList.remove('on');document.getElementById('wsTxt').textContent='reconectando';setTimeout(connect,1500);};
  ws.onmessage=e=>handle(JSON.parse(e.data));
}
function send(o){if(ws&&ws.readyState===1)ws.send(JSON.stringify(o));}
connect();

// ---------- estado ----------
const ST={loading:{c:'#8aa0ff',t:'Iniciando'},idle:{c:'#37e6ff',t:'En espera'},
  listening:{c:'#3dffa8',t:'Escuchando'},thinking:{c:'#ffb44d',t:'Procesando'},
  speaking:{c:'#37b0ff',t:'Hablando'},off:{c:'#ff5b6e',t:'Núcleo desconectado'},sleeping:{c:'#5a6b7a',t:'Reposo'}};
let cur='loading',col='#37e6ff',micLevel=0,levelHist=new Array(96).fill(0);
function setState(s){cur=s;const d=ST[s]||ST.idle;col=d.c;
  const el=document.getElementById('stateLabel');el.textContent=d.t;el.style.color=d.c;}

function addMsg(who,text,cls){const log=document.getElementById('log');
  const m=document.createElement('div');m.className='msg '+cls;
  m.innerHTML='<div class="w">'+who+'</div>'+esc(text);
  log.appendChild(m);log.scrollTop=log.scrollHeight;
  while(log.children.length>40)log.removeChild(log.firstChild);}
function esc(s){return s.replace(/[&<>]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[c]));}

function handle(m){
  if(m.type==='state')setState(m.value);
  else if(m.type==='level'){micLevel=m.value;document.getElementById('micV').textContent=Math.round(m.value*100)+'%';drawMicTicks(m.value);}
  else if(m.type==='heard')addMsg(m.source==='texto'?'Tú · texto':'Tú',m.text,'you');
  else if(m.type==='reply')addMsg('FORJIS',m.text,'bot');
  else if(m.type==='telemetry')telemetry(m);
  else if(m.type==='clap')clapFx();
  else if(m.type==='info')applyInfo(m);
}
function telemetry(m){
  document.getElementById('cpuV').textContent=m.cpu+'%';document.getElementById('cpuB').style.width=m.cpu+'%';
  document.getElementById('ramV').textContent=m.ram+'%';document.getElementById('ramB').style.width=m.ram+'%';
  const u=m.up;document.getElementById('upV').textContent=u<60?u+'s':(u<3600?Math.floor(u/60)+'m':Math.floor(u/3600)+'h '+Math.floor(u%3600/60)+'m');
}
function drawMicTicks(v){const n=micTicks.children.length;const on=Math.round(v*n);
  for(let i=0;i<n;i++)micTicks.children[i].classList.toggle('a',i<on);}
let backend='claude';
function applyInfo(i){
  const bd=document.getElementById('brainDot'),bt=document.getElementById('brainTxt');
  if(i.backend)backend=i.backend;
  const isLocal=backend==='local';
  if(i.brain==='on'){bd.classList.add('on');bt.textContent=(isLocal?'local':'Claude')+' ON';}
  else{bd.classList.remove('on');bt.textContent=(isLocal?'local':'Claude')+' OFF';}
  document.getElementById('modelPill').textContent=i.mock?'modo visual':(i.model||'');
  document.getElementById('brainBtn').textContent='🧠 '+(isLocal?'Local':'Claude');
  document.getElementById('voicePill').textContent='voz: '+(i.voice||'')+' · '+(i.speed||'');
  if(i.personality)document.getElementById('pers').value=i.personality;
  mark('voiceSeg','voice',i.voice);mark('speedSeg','speed',i.speed);
}
function mark(id,a,v){document.querySelectorAll('#'+id+' button').forEach(b=>b.classList.toggle('active',b.dataset[a]===v));}

function clapFx(){const f=document.getElementById('flash');f.style.opacity=1;setTimeout(()=>f.style.opacity=0,140);ripple();}

// ---------- controles ----------
const cmd=document.getElementById('cmd');
function sc(){const t=cmd.value.trim();if(t){send({type:'command',text:t});cmd.value='';}}
document.getElementById('send').onclick=sc;cmd.addEventListener('keydown',e=>{if(e.key==='Enter')sc();});
document.querySelectorAll('#voiceSeg button').forEach(b=>b.onclick=()=>send({type:'set_voice',voice:b.dataset.voice}));
document.querySelectorAll('#speedSeg button').forEach(b=>b.onclick=()=>send({type:'set_voice',speed:b.dataset.speed}));
document.getElementById('savePers').onclick=()=>send({type:'set_personality',text:document.getElementById('pers').value.trim()});
document.getElementById('brainBtn').onclick=()=>send({type:'set_brain',backend:backend==='local'?'claude':'local'});
document.getElementById('demo').onclick=()=>send({type:'demo'});

// ===================== FONDO (partículas) =====================
const bg=document.getElementById('bg'),bx=bg.getContext('2d');
let BW,BH;function rb(){const d=Math.min(2,devicePixelRatio||1);BW=bg.width=innerWidth*d;BH=bg.height=innerHeight*d;}
addEventListener('resize',rb);rb();
const stars=Array.from({length:90},()=>({x:Math.random(),y:Math.random(),z:Math.random()*.7+.3,s:Math.random()*1.6+.3}));
function drawBg(t){bx.clearRect(0,0,BW,BH);
  for(const s of stars){const x=((s.x+t*.003*s.z)%1)*BW,y=s.y*BH;
    bx.globalAlpha=.15+s.z*.4;bx.fillStyle='#4fd6ff';bx.beginPath();bx.arc(x,y,s.s*s.z,0,7);bx.fill();}
  bx.globalAlpha=1;}

// ===================== REACTOR =====================
const cv=document.getElementById('reactor'),ctx=cv.getContext('2d');
let W,H,DPR;function rr(){DPR=Math.min(2,devicePixelRatio||1);W=cv.width=innerWidth*DPR;H=cv.height=innerHeight*DPR;}
addEventListener('resize',rr);rr();
function hex(c){const n=parseInt(c.slice(1),16);return[n>>16&255,n>>8&255,n&255];}
let RGB=[55,230,255],amp=.12,ripples=[];
function ripple(){ripples.push({r:0,a:1});}
function lerp(a,b,t){return a+(b-a)*t;}
const NP=80,noise=Array.from({length:NP},()=>Math.random());

function draw(t){
  drawBg(t*120);
  const tg=hex(col);RGB=RGB.map((v,i)=>lerp(v,tg[i],.05));
  const[r,g,b]=RGB.map(v=>Math.round(v));const C=a=>`rgba(${r},${g},${b},${a})`;
  // amplitud objetivo
  let aT=.13+.05*Math.sin(t*1.6);
  if(cur==='listening')aT=.28+micLevel*1.0;
  else if(cur==='speaking')aT=.55+.4*Math.abs(Math.sin(t*7)+.5*Math.sin(t*11.3));
  else if(cur==='thinking')aT=.4+.12*Math.sin(t*5);
  else if(cur==='loading')aT=.3+.3*Math.sin(t*3);
  else if(cur==='off')aT=.07;
  amp=lerp(amp,Math.min(1.7,aT),.12);
  levelHist.push(cur==='speaking'?amp*.6+Math.random()*amp*.4:micLevel);levelHist.shift();

  ctx.clearRect(0,0,W,H);
  const cx=W/2,cy=H*.46,R=Math.min(W,H)*.20;

  // halo
  const hl=ctx.createRadialGradient(cx,cy,R*.2,cx,cy,R*3);
  hl.addColorStop(0,C(.20));hl.addColorStop(.5,C(.05));hl.addColorStop(1,C(0));
  ctx.fillStyle=hl;ctx.fillRect(0,0,W,H);

  ctx.save();ctx.translate(cx,cy);

  // ticks externos (60)
  ctx.strokeStyle=C(.5);ctx.lineWidth=1.4*DPR;
  for(let i=0;i<60;i++){const a=i/60*Math.PI*2+t*.15;const big=i%5===0;
    const r1=R*2.0,r2=R*(big?2.16:2.09);
    ctx.globalAlpha=big?.6:.28;ctx.beginPath();
    ctx.moveTo(Math.cos(a)*r1,Math.sin(a)*r1);ctx.lineTo(Math.cos(a)*r2,Math.sin(a)*r2);ctx.stroke();}
  ctx.globalAlpha=1;

  // arcos segmentados (rotan)
  function arc(rad,a0,a1,w,al){ctx.beginPath();ctx.arc(0,0,rad,a0,a1);ctx.strokeStyle=C(al);ctx.lineWidth=w;ctx.stroke();}
  for(let k=0;k<3;k++){const o=t*(k%2?-0.5:0.7)+k*2.1;
    arc(R*(1.5+k*.13),o,o+1.1,3*DPR,.55);arc(R*(1.5+k*.13),o+2.4,o+3.2,3*DPR,.35);}

  // círculo punteado medio
  ctx.setLineDash([4*DPR,7*DPR]);arc(R*1.32,0,Math.PI*2,1.4*DPR,.4);ctx.setLineDash([]);

  // waveform circular
  ctx.beginPath();
  for(let i=0;i<levelHist.length;i++){const a=i/levelHist.length*Math.PI*2 - t*.3;
    const rr=R*(1.05+levelHist[i]*.5);const x=Math.cos(a)*rr,y=Math.sin(a)*rr;i?ctx.lineTo(x,y):ctx.moveTo(x,y);}
  ctx.closePath();ctx.strokeStyle=C(.5);ctx.lineWidth=1.4*DPR;ctx.stroke();

  // anillo de partículas reactivo
  ctx.beginPath();
  for(let i=0;i<=NP;i++){const a=i/NP*Math.PI*2;
    const wob=Math.sin(a*5+t*2)*.5+Math.sin(a*9-t*3)*.5;
    const rr=R*(1+amp*(.18*wob+.22*noise[i%NP]));
    const x=Math.cos(a)*rr,y=Math.sin(a)*rr;i?ctx.lineTo(x,y):ctx.moveTo(x,y);}
  ctx.closePath();ctx.strokeStyle=C(.9);ctx.lineWidth=2*DPR;
  ctx.shadowBlur=24*DPR;ctx.shadowColor=C(.9);ctx.stroke();ctx.shadowBlur=0;

  // núcleo
  const core=ctx.createRadialGradient(0,0,0,0,0,R*(.95+amp*.15));
  core.addColorStop(0,C(.95));core.addColorStop(.35,C(.5));core.addColorStop(.8,C(.1));core.addColorStop(1,C(0));
  ctx.fillStyle=core;ctx.beginPath();ctx.arc(0,0,R*(.95+amp*.15),0,7);ctx.fill();
  ctx.fillStyle=`rgba(255,255,255,${.55+amp*.4})`;ctx.beginPath();ctx.arc(0,0,R*.10*(1+amp*.5),0,7);ctx.fill();

  // ondas de aplauso
  ripples=ripples.filter(rp=>rp.a>.02);
  for(const rp of ripples){rp.r+=R*.06;rp.a*=.94;
    ctx.beginPath();ctx.arc(0,0,R*1.1+rp.r,0,7);ctx.strokeStyle=C(rp.a*.7);ctx.lineWidth=2*DPR;ctx.stroke();}

  ctx.restore();
  requestAnimationFrame(ts=>draw(ts*.001));
}
requestAnimationFrame(ts=>draw(ts*.001));
